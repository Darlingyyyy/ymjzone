<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YMJ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c14;
    color: #c8c8d8;
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', system-ui, sans-serif;
    min-height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  canvas#bg { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }

  /* ═══════════ 加载页 ═══════════ */
  .loading {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #0c0c14; transition: opacity 0.6s;
  }
  .loading.done { opacity: 0; pointer-events: none; }
  .loading-bar {
    width: 200px; height: 1px; background: rgba(255,255,255,0.06);
    border-radius: 1px; overflow: hidden;
  }
  .loading-bar-fill {
    width: 0%; height: 100%; background: rgba(180,180,210,0.4);
    transition: width 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .loading-bar-fill.active { width: 100%; }

  /* ═══════════ 动画阶段：头像居中 ═══════════ */
  .center-stage {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center; z-index: 90; transition: all 1s cubic-bezier(0.4,0,0.2,1);
    filter: blur(0); opacity: 1;
  }
  .center-stage.dissolve {
    filter: blur(30px); opacity: 0;
    transition: all 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .avatar-big {
    width: 120px; height: 120px; border-radius: 50%;
    object-fit: cover; margin-bottom: 20px;
    border: 1.5px solid rgba(255,255,255,0.06);
    background: #1a1a28;
  }
  .name-big { font-size: 28px; font-weight: 600; color: #e8e8f4; letter-spacing: 6px; }

  /* ═══════════ 主页：头像左上角 ═══════════ */
  .main-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 80;
    opacity: 0; transition: opacity 0.6s 0.3s;
    pointer-events: none;
  }
  .main-page.visible { opacity: 1; pointer-events: auto; }

  .header {
    position: absolute; top: 32px; left: 32px;
    display: flex; align-items: center; gap: 14px;
  }
  .avatar-sm {
    width: 40px; height: 40px; border-radius: 50%;
    object-fit: cover; border: 1px solid rgba(255,255,255,0.06);
    background: #1a1a28;
  }
  .name-sm { font-size: 16px; font-weight: 600; color: #d0d0e0; letter-spacing: 2px; }

  /* ── 模块卡片 ── */
  .modules {
    position: absolute; bottom: 32px; left: 32px; right: 32px;
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .mod-card {
    flex: 1; min-width: 130px;
    background: rgba(255,255,255,0.022);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 14px; padding: 16px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s;
  }
  .mod-card.clickable { cursor: pointer; }
  .mod-card.clickable:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
  }
  .mod-card .mc-icon { font-size: 18px; margin-bottom: 6px; }
  .mod-card .mc-label { font-size: 10px; letter-spacing: 2px; color: #5a5a72; margin-bottom: 4px; }
  .mod-card .mc-content { font-size: 12px; color: #7878a0; line-height: 1.4; }

  /* ═══════════ 第二页：链接页 ═══════════ */
  .links-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 85;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden; transition: all 0.5s;
  }
  .links-page.visible { opacity: 1; visibility: visible; }

  .links-container {
    width: 340px; max-width: 90vw;
    display: flex; flex-direction: column; gap: 8px;
  }
  .link-card {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 20px; border-radius: 14px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
    text-decoration: none; color: #b0b0c8;
    font-size: 14px; letter-spacing: 0.5px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: all 0.25s;
  }
  .link-card:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.1);
    color: #d0d0e0;
  }
  .link-card .lc-icon { font-size: 20px; width: 28px; text-align: center; }
  .link-card .lc-arrow { margin-left: auto; color: #33334a; font-size: 13px; }
  .back-link {
    color: #48485c; font-size: 12px; letter-spacing: 2px;
    cursor: pointer; text-align: center; margin-top: 20px;
    transition: color 0.3s;
  }
  .back-link:hover { color: #8a8aa2; }

  /* ── 播放器内嵌 ── */
  .player-inline {
    display: flex; align-items: center; gap: 8px;
  }
  .player-btn {
    background: transparent; border: none; color: #5a5a72;
    font-size: 14px; cursor: pointer; padding: 4px;
    transition: color 0.2s;
  }
  .player-btn:hover { color: #a0a0b8; }

  @media (max-width: 600px) {
    .header { top: 24px; left: 20px; }
    .modules { bottom: 20px; left: 20px; right: 20px; flex-direction: column; }
    .mod-card { min-width: auto; }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- ═══════════ 加载页 ═══════════ -->
<div class="loading" id="loading">
  <div class="loading-bar"><div class="loading-bar-fill" id="loadFill"></div></div>
</div>

<!-- ═══════════ 动画阶段：头像居中 ═══════════ -->
<div class="center-stage" id="centerStage" style="opacity:0">
  <img class="avatar-big" src="YMJ.jpg" alt="YMJ">
  <div class="name-big">YMJ</div>
</div>

<!-- ═══════════ 主页 ═══════════ -->
<div class="main-page" id="mainPage">
  <div class="header">
    <img class="avatar-sm" src="YMJ.jpg" alt="YMJ">
    <span class="name-sm">YMJ</span>
  </div>

  <div class="modules">
    <div class="mod-card clickable" onclick="togglePlay()">
      <div class="mc-icon">🎵</div>
      <div class="mc-label">正在播放</div>
      <div class="mc-content" id="playLabel">Lofi · 点击播放</div>
    </div>

    <div class="mod-card">
      <div class="mc-icon">☁️</div>
      <div class="mc-label">状态</div>
      <div class="mc-content">今天也没说什么话，挺好的。</div>
    </div>

    <div class="mod-card">
      <div class="mc-icon">🎮</div>
      <div class="mc-label">正在玩</div>
      <div class="mc-content">PC 端游，随便打打</div>
    </div>

    <div class="mod-card clickable" onclick="goLinks()">
      <div class="mc-icon">🔗</div>
      <div class="mc-label">找到我</div>
      <div class="mc-content">各平台 →</div>
    </div>
  </div>
</div>

<!-- ═══════════ 第二页：链接 ═══════════ -->
<div class="links-page" id="linksPage">
  <div>
    <div class="links-container">
      <a href="#" class="link-card"><span class="lc-icon">🎵</span>抖音<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">📺</span>Bilibili<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">📕</span>小红书<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">📷</span>Instagram<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">🐦</span>Twitter / X<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">💼</span>LinkedIn<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">🐙</span>GitHub<span class="lc-arrow">→</span></a>
      <a href="#" class="link-card"><span class="lc-icon">🎧</span>网易云音乐<span class="lc-arrow">→</span></a>
    </div>
    <div class="back-link" onclick="goMain()">← 返回</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>
<script>
// ═══════════ 背景：云 + 雨 ═══════════
const bgC=document.getElementById('bg'),ctx=bgC.getContext('2d');
let w,h,rainI=0.7;
function resize(){w=bgC.width=innerWidth;h=bgC.height=innerHeight}
resize();addEventListener('resize',resize);
class Cloud{
  constructor(){this.reset(true)}
  reset(init){this.x=init?Math.random()*w:w+200;this.y=Math.random()*h*.35;this.w=100+Math.random()*180;this.h=30+Math.random()*50;this.speed=.1+Math.random()*.3;this.a=.02+Math.random()*.05}
  update(){this.x-=this.speed;if(this.x<-this.w-50)this.reset(false)}
  draw(){ctx.fillStyle=`rgba(160,175,200,${this.a})`;ctx.beginPath();const cx=this.x,cy=this.y,w2=this.w/2,h2=this.h/2;for(const[x,y,r]of[[cx,cy,h2],[cx-w2*.5,cy+h2*.2,h2*.7],[cx+w2*.5,cy+h2*.1,h2*.75],[cx-w2*.25,cy-h2*.3,h2*.8],[cx+w2*.3,cy-h2*.2,h2*.7],[cx-w2*.6,cy+h2*.4,h2*.5],[cx+w2*.6,cy+h2*.3,h2*.55]]){ctx.moveTo(x+r,y);ctx.arc(x,y,r,0,Math.PI*2)}ctx.fill()}
}
class RainDrop{
  constructor(){this.reset(true)}
  reset(init){this.x=Math.random()*(w+200)-100;this.y=init?Math.random()*h:-60;this.len=18+Math.random()*35;this.speed=6+Math.random()*10;this.a_=.03+Math.random()*.07;this.w_=.3+Math.random()*.5;this.angle=.35+Math.random()*.15;this.dx=Math.sin(this.angle)*this.len;this.dy=Math.cos(this.angle)*this.len}
  update(){this.y+=this.speed*rainI;this.x+=this.speed*Math.tan(this.angle)*.7*rainI;if(this.y>h+60)this.reset(false)}
  draw(){if(rainI<0.01)return;ctx.strokeStyle=`rgba(150,175,205,${this.a_})`;ctx.lineWidth=this.w_;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x+this.dx,this.y+this.dy);ctx.stroke()}
}
const clouds=Array.from({length:10},()=>new Cloud),allRain=Array.from({length:200},()=>new RainDrop);
(function L(){ctx.clearRect(0,0,w,h);clouds.forEach(c=>{c.update();c.draw()});allRain.forEach(r=>{r.update();r.draw()});requestAnimationFrame(L)})();

// ═══════════ 入场动画 ═══════════
window.addEventListener('load', () => {
  const loadFill = document.getElementById('loadFill');
  const loading = document.getElementById('loading');
  const stage = document.getElementById('centerStage');
  const main = document.getElementById('mainPage');

  // 1. 加载条
  setTimeout(() => loadFill.classList.add('active'), 200);

  // 2. 加载完成 → 头像出现
  setTimeout(() => {
    loading.classList.add('done');
    stage.style.transition = 'opacity 0.8s ease';
    stage.style.opacity = '1';
  }, 1600);

  // 3. 停留 → 溶解消失
  setTimeout(() => {
    stage.classList.add('dissolve');
  }, 3000);

  // 4. 溶解完成 → 主页出现（头像在左上）
  setTimeout(() => {
    stage.style.display = 'none';
    main.classList.add('visible');
  }, 3900);
});

// ═══════════ 页面切换 ═══════════
function goLinks() {
  document.getElementById('mainPage').classList.remove('visible');
  document.getElementById('linksPage').classList.add('visible');
}
function goMain() {
  document.getElementById('linksPage').classList.remove('visible');
  document.getElementById('mainPage').classList.add('visible');
}

// ═══════════ Lofi ═══════════
let playing=false,synth;
function togglePlay(){const lb=document.getElementById('playLabel');if(!playing){lb.textContent='Lofi · 播放中';if(!synth)synth=new Tone.PolySynth(Tone.Synth,{volume:-20,oscillator:{type:'sine'},envelope:{attack:.8,decay:.3,sustain:.4,release:1.5}}).toDestination();Tone.start();const N=['C4','E4','G4','A4','C5','D5','E5','G5'];synth._lp=new Tone.Loop(t=>{if(!playing)return;synth.triggerAttackRelease(N[Math.floor(Math.random()*N.length)],'4n',t,.15+Math.random()*.1)},'2n').start(0);Tone.Transport.start();playing=true}else{lb.textContent='Lofi · 点击播放';if(synth._lp)synth._lp.stop();Tone.Transport.stop();playing=false}}
</script>
</body>
</html>
